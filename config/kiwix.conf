# Kiwix Server Configuration
# Re-curated 2026-07-23 — all URLs below were verified against kiwix.org's
# current directory listings. Kiwix's dated ZIM snapshots get rotated off
# their server over time, so URLs (and sizes!) here will go stale again
# eventually — re-check https://download.kiwix.org/zim/<category>/ if a
# download starts 404ing.
#
# Only the variables below are actually read by scripts/update_content.sh —
# KIWIX_PORT, AUTO_UPDATE/UPDATE_SCHEDULE/UPDATE_TIME, and several other
# knobs that used to live here were dead config nothing consumed (the
# service port and update schedule are set directly in the systemd units).

KIWIX_DATA_DIR="/opt/prepperpi/data/kiwix"
KIWIX_LIBRARY_FILE="/opt/prepperpi/data/library.xml"
PDF_DATA_DIR="/opt/prepperpi/data/pdfs"
DOCUMENTS_DATA_DIR="/opt/prepperpi/data/documents"

DOWNLOAD_LIMIT="2M"
RETRY_ATTEMPTS=3
TIMEOUT_SECONDS=7200          # 2 hours for large files
MIN_FREE_SPACE="10GB"
AUTO_CLEANUP=true

# =============================================================================
# STORAGE PROFILES
# =============================================================================

STORAGE_PROFILE="minimal"

case $STORAGE_PROFILE in
    "minimal")
        # ~29GB total
        CONTENT_SOURCES=(
            "https://download.kiwix.org/zim/wikipedia/wikipedia_en_top_maxi_2026-06.zim"   # 7.8GB - top articles, with images
            "https://download.kiwix.org/zim/gutenberg/gutenberg_en_lcc-pr_2025-12.zim"     # 15GB  - English literature
            "https://download.kiwix.org/zim/ted/ted_mul_communication_2026-04.zim"         # 5.9GB - TED: Communication
            "https://download.kiwix.org/zim/zimit/based.cooking_en_all_2026-05.zim"        # 15MB  - cooking/food prep
        )
        ;;
    "medium")
        # ~86GB total
        CONTENT_SOURCES=(
            "https://download.kiwix.org/zim/wikipedia/wikipedia_en_all_nopic_2026-06.zim"  # 49GB  - full Wikipedia, no images
            "https://download.kiwix.org/zim/wikivoyage/wikivoyage_en_all_maxi_2026-06.zim" # 1.1GB - travel guides
            "https://download.kiwix.org/zim/wiktionary/wiktionary_en_all_nopic_2026-05.zim" # 8.5GB - dictionary
            "https://download.kiwix.org/zim/gutenberg/gutenberg_en_lcc-pr_2025-12.zim"     # 15GB  - English literature
            "https://download.kiwix.org/zim/stack_exchange/askubuntu.com_en_all_2026-06.zim" # 2.6GB - Linux/Ubuntu Q&A
            "https://download.kiwix.org/zim/stack_exchange/superuser.com_en_all_2026-02.zim" # 3.7GB - general computing Q&A
            "https://download.kiwix.org/zim/ted/ted_mul_communication_2026-04.zim"         # 5.9GB - TED: Communication
            "https://download.kiwix.org/zim/zimit/based.cooking_en_all_2026-05.zim"        # 15MB  - cooking/food prep
        )
        ;;
    "large")
        # ~115GB total
        # Note: stackoverflow.com_en_all is now 74-75GB alone (was ~15GB when
        # this config was first written) — too large to combine with anything
        # else at this tier, so it's left out entirely. Add it back explicitly
        # if you have the room: stack_exchange/stackoverflow.com_en_all_2023-11.zim
        CONTENT_SOURCES=(
            "https://download.kiwix.org/zim/wikipedia/wikipedia_en_all_maxi_2026-02.zim"   # 115GB - full Wikipedia with images
        )
        ;;
esac

# =============================================================================
# PDF AND DOCUMENT SOURCES
# =============================================================================

# U.S. Military and Survival Manuals (PDFs)
SURVIVAL_PDF_SOURCES=(
    "https://armypubs.army.mil/epubs/DR_pubs/DR_a/pdf/web/ARN30964_FM%203-05.70%20C1%20FINAL%20WEB.pdf"
    # marines.mil MCTP 11-10B removed: now returns 403 Forbidden
)

# Medical and Health PDFs
MEDICAL_PDF_SOURCES=(
    # Note: original candidates here all 404'd; none currently populated
)

echo "Kiwix configuration loaded"
echo "Storage profile: $STORAGE_PROFILE"
echo "Total content sources configured: ${#CONTENT_SOURCES[@]}"
